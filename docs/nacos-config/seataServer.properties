# Seata 2.5.0 — TC + Client 共享配置（通过 Nacos SEATA_GROUP 下发）
store.mode=file
store.file.dir=sessionStore
store.file.maxBranchSessionSize=16384
store.file.maxGlobalSessionSize=512

# 事务分组映射（client tx-service-group → TC cluster）
service.vgroupMapping.default_tx_group=default
# 直连 TC 地址，绕过 Nacos 服务发现（Docker 容器内 IP 不可达）
service.grouplist.default=192.168.137.128:8091

# RPC 超时
transport.rpcTcRequestTimeout=15000
